name: CI

on:
  push:
    branches: [main, feat/*, fix/*, refactor/*]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint dependencies
        run: |
          python -m pip install ruff

      - name: Run ruff
        run: ruff check src/ tests/

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project with all extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[all]" pytest pytest-cov

      - name: Run tests with coverage
        run: |
          PYTHONPATH=src python -m pytest tests/ -v --tb=long --cov=src/learning_companion --cov-report=term-missing
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || 'placeholder' }}

  test-no-extras:
    name: Test (base deps only)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install base project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "." pytest

      - name: Run tests
        run: |
          PYTHONPATH=src python -m pytest tests/ -v --tb=long
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || 'placeholder' }}

  eval:
    name: Eval (LLM-as-judge)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project with all extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[all]"

      - name: Run eval on golden dataset
        run: |
          if [ "$DEEPSEEK_API_KEY" = "placeholder" ]; then
            echo "⚠️ No real API key — skipping eval (placeholder detected)"
            echo '{"skipped": true, "reason": "placeholder API key"}' > eval_report.json
          else
            PYTHONPATH=src python -m learning_companion eval --golden tests/golden.json --threshold 0.5
          fi
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || 'placeholder' }}

      - name: Show eval report
        if: always()
        run: |
          if [ -f eval_report.json ]; then
            cat eval_report.json | python3 -m json.tool | head -20
          fi
